name: Günlük TJK verisi

on:
  schedule:
    # Sabah 08:30 TR (05:30 UTC): günün programını çek
    - cron: "30 5 * * *"
    # Gece 23:45 TR (20:45 UTC): günün sonuçlarını çek
    - cron: "45 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  veri-cek:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: TJK verilerini çek
        run: python3 scripts/fetch_tjk.py

      - name: Değişiklikleri işle
        run: |
          git config user.name "altili-bulan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Yeni veri yok."
          else
            git commit -m "Günlük veri: $(date -u +%Y-%m-%d' '%H:%M) UTC"
            git push
          fi
