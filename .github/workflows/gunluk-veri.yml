name: Günlük TJK verisi

on:
  schedule:
    # Sabah 08:30 TR (05:30 UTC): günün programını çek
    - cron: "30 5 * * *"
    # Gece 23:45 TR (20:45 UTC): günün sonuçlarını çek
    - cron: "45 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Sabah ve akşam koşuları (ya da elle tetikleme) üst üste binmesin — biri bitmeden diğeri başlamasın
concurrency:
  group: gunluk-veri
  cancel-in-progress: false

jobs:
  veri-cek:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: TJK verilerini çek
        run: python3 scripts/fetch_tjk.py

      - name: Accurace koşu-karakter profillerini güncelle
        # Sonuçlanmış koşuları işler; sabah koşusunda sonuç yoksa sessizce boş geçer.
        # accurace/TJK erişimi başarısız olsa bile TJK verisinin commit'lenmesini engellemesin.
        continue-on-error: true
        run: python3 scripts/fetch_accurace.py

      - name: Sonuç arşivini ve istatistikleri güncelle
        # Son 7 günün eksik günlerini arşive ekler (idempotent) ve stats.json'u yeniden üretir.
        continue-on-error: true
        run: |
          python3 scripts/backfill_arsiv.py "$(date -u -d '7 days ago' +%Y-%m-%d)" "$(date -u -d 'yesterday' +%Y-%m-%d)"
          python3 scripts/build_stats.py

      - name: Değişiklikleri işle
        run: |
          git config user.name "altili-bulan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Yeni veri yok."
          else
            git commit -m "Günlük veri: $(date -u +%Y-%m-%d' '%H:%M) UTC"
            # Veri çekimi saatler sürebiliyor; bu sırada repoya başka push gelmiş olabilir.
            # Push reddedilirse rebase edip birkaç kez yeniden dene — günün verisi kaybolmasın.
            for i in 1 2 3; do
              if git push; then break; fi
              echo "Push reddedildi, rebase edip yeniden deneniyor ($i/3)…"
              git pull --rebase origin main
            done
          fi
